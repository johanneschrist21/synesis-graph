<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synesis Knowledge Graph</title>
    <!-- Tailwind for UI overlays -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Force Graph Library -->
    <script src="https://unpkg.com/force-graph"></script>
    <style>
        :root {
            --bg: #0f172a;
            --bg-panel: rgba(15, 23, 42, 0.85);
            --bg-panel-hover: rgba(30, 41, 59, 0.95);
            --border: rgba(51, 65, 85, 0.8);
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
            --node-label-bg: rgba(15, 23, 42, 0.85);
            --graph-bg: #0f172a;
        }
        :root.light {
            --bg: #f1f5f9;
            --bg-panel: rgba(255, 255, 255, 0.88);
            --bg-panel-hover: rgba(241, 245, 249, 0.98);
            --border: rgba(203, 213, 225, 0.9);
            --text-primary: #0f172a;
            --text-muted: #475569;
            --node-label-bg: rgba(255, 255, 255, 0.88);
            --graph-bg: #e2e8f0;
        }

        * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }

        body { margin: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; }
        #graph-container { width: 100vw; height: 100vh; }

        .panel {
            background: var(--bg-panel);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 1.5px 4px rgba(0,0,0,0.10);
        }
        .panel-text { color: var(--text-primary); }
        .panel-muted { color: var(--text-muted); }

        /* Theme Toggle Button */
        #theme-toggle {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            pointer-events: auto;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        #theme-toggle:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
        #theme-toggle .toggle-track {
            width: 36px; height: 20px;
            border-radius: 999px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            position: relative;
            transition: background 0.3s;
        }
        :root.light #theme-toggle .toggle-track {
            background: linear-gradient(135deg, #f59e0b, #f97316);
        }
        #theme-toggle .toggle-thumb {
            position: absolute; top: 3px; left: 3px;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.3s cubic-bezier(.4,0,.2,1);
        }
        :root.light #theme-toggle .toggle-thumb { transform: translateX(16px); }

        /* Tooltip */
        .scene-tooltip {
            background: var(--bg-panel) !important;
            border: 1px solid var(--border) !important;
            border-radius: 10px;
            padding: 10px 14px !important;
            color: var(--text-primary) !important;
            font-size: 13px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            backdrop-filter: blur(12px);
        }

        /* Search Box */
        #search-box {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 7px 16px 7px 36px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            width: 180px;
            transition: width 0.3s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(12px);
        }
        #search-box:focus { width: 240px; box-shadow: 0 0 0 2px #3b82f680; }
        #search-box::placeholder { color: var(--text-muted); }
        .search-wrap { position: relative; pointer-events: auto; }
        .search-icon {
            position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 14px; pointer-events: none;
        }

        /* Node info panel */
        #node-info {
            position: absolute; bottom: 70px; right: 24px;
            min-width: 220px; max-width: 300px;
            padding: 16px 18px;
            z-index: 20;
            display: none;
            animation: fadeSlideUp 0.2s ease;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200">

    <!-- UI Overlay: Header -->
    <div class="absolute top-0 left-0 p-5 pointer-events-none z-10 w-full flex justify-between items-start">
        <!-- Left: Title + Search -->
        <div class="flex flex-col gap-3">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tight">
                    Synesis Architecture
                </h1>
                <p class="mt-0.5 text-sm panel-muted">Interactive Knowledge Graph Explorer</p>
            </div>
            <!-- Search -->
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input id="search-box" type="text" placeholder="Search nodes…" autocomplete="off" />
            </div>
        </div>

        <!-- Right: Theme Toggle + Legend -->
        <div class="flex flex-col items-end gap-3">
            <!-- Theme Toggle -->
            <button id="theme-toggle" title="Toggle dark/light mode">
                <span id="theme-label">🌙 Dark</span>
                <div class="toggle-track"><div class="toggle-thumb"></div></div>
            </button>

            <!-- Legend -->
            <div class="panel p-4 pointer-events-auto">
                <h3 class="text-xs font-semibold panel-muted uppercase tracking-wider mb-3">Node Types</h3>
                <ul class="space-y-2 text-sm panel-text" id="legend-list"></ul>
            </div>
        </div>
    </div>

    <!-- Node Info Panel -->
    <div id="node-info" class="panel">
        <div class="flex items-center gap-2 mb-2">
            <div id="node-info-dot" style="width:12px;height:12px;border-radius:50%;flex-shrink:0"></div>
            <span id="node-info-name" class="font-bold text-sm panel-text"></span>
        </div>
        <div class="text-xs panel-muted" id="node-info-type"></div>
        <div class="text-xs panel-muted mt-1" id="node-info-children"></div>
    </div>

    <!-- UI Overlay: Instructions -->
    <div class="absolute bottom-5 left-5 pointer-events-none z-10 text-sm panel px-4 py-2" style="border-radius:999px">
        <span class="panel-muted"><span class="panel-text font-semibold">Scroll</span> to zoom • <span class="panel-text font-semibold">Drag</span> to pan • <span class="panel-text font-semibold">Click</span> node to expand</span>
    </div>

    <!-- Graph Container -->
    <div id="graph-container"></div>

    <script>
        // ── State (declared first so all callbacks can close over them) ──
        let isLight = false;
        let searchTerm = '';

        fetch('./graph-data.json')
            .then(r => r.json())
            .then(rawData => initGraph(rawData))
            .catch(err => console.error('Failed to load graph-data.json:', err));

        function initGraph(rawData) {
        // Theme configuration (inside initGraph)
        const theme = {
            center:   { color: '#f59e0b', size: 24, name: 'Core System' },  // Amber
            channel:  { color: '#3b82f6', size: 14, name: 'Channel' },      // Blue
            skill:    { color: '#8b5cf6', size: 18, name: 'Skill Module' }, // Purple
            category: { color: '#f97316', size: 14, name: 'Category' },     // Orange
            file:     { color: '#10b981', size: 10, name: 'File/Doc' },     // Emerald
            media:    { color: '#94a3b8', size: 8,  name: 'Media Asset' },  // Slate
            task:     { color: '#ec4899', size: 6,  name: 'Task/Section' }  // Pink
        };

        // Populate Legend
        const legendList = document.getElementById('legend-list');
        Object.keys(theme).forEach(type => {
            const li = document.createElement('li');
            li.className = 'flex items-center gap-2';
            li.innerHTML = `
                <div style="width:10px;height:10px;border-radius:50%;background:${theme[type].color};box-shadow:0 0 7px ${theme[type].color}99;flex-shrink:0"></div>
                <span class="panel-text">${theme[type].name}</span>
            `;
            legendList.appendChild(li);
        });

        // Build hierarchy mapping to support expand/collapse
        const childrenById = {};
        rawData.edges.forEach(e => {
            if (!childrenById[e.from]) childrenById[e.from] = [];
            childrenById[e.from].push(e.to);
        });

        // Calculate depths from center ('synesis') to know default collapse state
        const depths = { 'synesis': 0 };
        const queue = ['synesis'];
        while(queue.length > 0) {
            const id = queue.shift();
            (childrenById[id] || []).forEach(childId => {
                if (depths[childId] === undefined) {
                    depths[childId] = depths[id] + 1;
                    queue.push(childId);
                }
            });
        }

        // Initialize stateful node objects
        const gNodes = rawData.nodes.map(n => ({
            id: n.id,
            name: n.label,
            group: n.type,
            val: theme[n.type]?.size || 5,
            color: theme[n.type]?.color || '#ffffff',
            // Collapse nodes at depth 2 or deeper by default (hides depth 3+)
            collapsed: depths[n.id] >= 2 
        }));

        const gNodesById = {};
        gNodes.forEach(n => gNodesById[n.id] = n);

        // Initialize stateful link objects
        const gLinks = rawData.edges.map(e => ({
            source: e.from,
            target: e.to
        }));

        // Function to compute currently visible graph
        function getVisibleGraphData() {
            const visibleNodeIds = new Set(['synesis']);
            const q = ['synesis'];

            // Traverse from root, stopping at collapsed nodes
            while(q.length > 0) {
                const id = q.shift();
                const node = gNodesById[id];
                
                if (!node?.collapsed) {
                    (childrenById[id] || []).forEach(childId => {
                        if (!visibleNodeIds.has(childId)) {
                            visibleNodeIds.add(childId);
                            q.push(childId);
                        }
                    });
                }
            }

            // Important Fix: Return cloned link structures! 
            // force-graph mutates the source/target into object references. If we feed it recycled mutated arrays, it crashes.
            const visibleNodes = gNodes.filter(n => visibleNodeIds.has(n.id));
            const visibleLinks = gLinks.filter(l => {
                const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
                const targetId = typeof l.target === 'object' ? l.target.id : l.target;
                return visibleNodeIds.has(sourceId) && visibleNodeIds.has(targetId);
            }).map(l => ({
                source: typeof l.source === 'object' ? l.source.id : l.source,
                target: typeof l.target === 'object' ? l.target.id : l.target
            }));

            return { nodes: visibleNodes, links: visibleLinks };
        }

        // Initialize Graph
        const elem = document.getElementById('graph-container');
        const Graph = ForceGraph()(elem)
            .graphData(getVisibleGraphData())
            .backgroundColor('#0f172a')
            // Node Styling
            .nodeId('id')
            .nodeVal('val')
            .nodeColor('color')
            .nodeLabel(node => `<b>${node.name}</b><br/><span style="font-size:11px;opacity:0.7">Type: ${node.group}</span>`)
            // Links & Physics
            .linkColor(link => {
                const sid = typeof link.source === 'object' ? link.source.id : link.source;
                const src = gNodesById[sid];
                return src ? src.color + '55' : 'rgba(148,163,184,0.2)';
            })
            .linkWidth(link => {
                const sid = typeof link.source === 'object' ? link.source.id : link.source;
                const src = gNodesById[sid];
                if (!src) return 1;
                return src.group === 'center' ? 2.5 : src.group === 'skill' || src.group === 'category' ? 1.8 : 1;
            })
            .linkDirectionalArrowLength(4)
            .linkDirectionalArrowRelPos(1)
            .linkDirectionalParticles(2)
            .linkDirectionalParticleWidth(1.5)
            .linkDirectionalParticleColor(link => {
                const sid = typeof link.source === 'object' ? link.source.id : link.source;
                const src = gNodesById[sid];
                return src ? src.color : '#94a3b8';
            })
            .linkDirectionalParticleSpeed(0.005)
            // Interactions
            .onNodeClick(node => {
                const hasChildren = Boolean(childrenById[node.id]?.length);

                if (hasChildren) {
                    node.collapsed = !node.collapsed;
                    Graph.graphData(getVisibleGraphData());
                }

                // Node info panel
                const info = document.getElementById('node-info');
                const childCount = (childrenById[node.id] || []).length;
                document.getElementById('node-info-dot').style.background = node.color;
                document.getElementById('node-info-dot').style.boxShadow = `0 0 8px ${node.color}`;
                document.getElementById('node-info-name').textContent = node.name;
                document.getElementById('node-info-type').textContent = `Type: ${node.group}`;
                document.getElementById('node-info-children').textContent = childCount
                    ? `${childCount} connection${childCount > 1 ? 's' : ''} — click to ${node.collapsed ? 'expand' : 'collapse'}`
                    : 'Leaf node';
                info.style.display = 'block';

                Graph.centerAt(node.x, node.y, 800);
                Graph.zoom(hasChildren && !node.collapsed ? 1.5 : 3, 800);
            })
            // Custom Canvas Render
            .nodeCanvasObject((node, ctx, globalScale) => {
                const label = node.name;
                const fontSize = 12 / globalScale;
                const hasChildren = Boolean(childrenById[node.id]?.length);
                const isMatch = searchTerm && node.name.toLowerCase().includes(searchTerm);
                const isDimmed = searchTerm && !isMatch;

                ctx.font = `${fontSize}px Inter, Sans-Serif`;

                // Glow effect
                const glowRadius = node.val * (isMatch ? 3.5 : 2.2);
                const grd = ctx.createRadialGradient(node.x, node.y, node.val * 0.3, node.x, node.y, glowRadius);
                grd.addColorStop(0, node.color + (isDimmed ? '22' : '55'));
                grd.addColorStop(1, node.color + '00');
                ctx.beginPath();
                ctx.arc(node.x, node.y, glowRadius, 0, 2 * Math.PI);
                ctx.fillStyle = grd;
                ctx.fill();

                // Node circle
                ctx.globalAlpha = isDimmed ? 0.2 : 1;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.val, 0, 2 * Math.PI);
                ctx.fillStyle = node.color;
                ctx.fill();

                // Stroke
                ctx.lineWidth = (isMatch ? 3 : hasChildren && node.collapsed ? 2.5 : 1) / globalScale;
                ctx.strokeStyle = isMatch ? '#facc15' : hasChildren && node.collapsed ? '#fbbf24' : 'rgba(255,255,255,0.5)';
                ctx.stroke();
                ctx.globalAlpha = 1;

                // '+' inside collapsed expandable nodes
                if (hasChildren && node.collapsed && node.val >= 4 && !isDimmed) {
                    ctx.fillStyle = isLight ? '#fff' : '#0f172a';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.font = `bold ${node.val * 1.1}px Inter`;
                    ctx.fillText('+', node.x, node.y + 0.5 / globalScale);
                }

                // Label
                if (!isDimmed && (globalScale > 1.2 || node.val > 6 || (hasChildren && node.collapsed))) {
                    ctx.font = `${isMatch ? 'bold ' : ''}${fontSize}px Inter, Sans-Serif`;
                    const textWidth = ctx.measureText(label).width;
                    const textY = node.y + node.val + 4 / globalScale;
                    const pad = 3 / globalScale;

                    // Label background
                    ctx.fillStyle = isLight ? 'rgba(255,255,255,0.88)' : 'rgba(15,23,42,0.85)';
                    ctx.beginPath();
                    const rx = node.x - textWidth / 2 - pad;
                    const ry = textY - pad * 0.5;
                    const rw = textWidth + pad * 2;
                    const rh = fontSize + pad * 1.5;
                    const r = 3 / globalScale;
                    ctx.moveTo(rx + r, ry); ctx.lineTo(rx + rw - r, ry);
                    ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
                    ctx.lineTo(rx + rw, ry + rh - r);
                    ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
                    ctx.lineTo(rx + r, ry + rh);
                    ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
                    ctx.lineTo(rx, ry + r);
                    ctx.quadraticCurveTo(rx, ry, rx + r, ry);
                    ctx.closePath();
                    ctx.fill();

                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = isMatch ? '#facc15' : isLight ? '#0f172a' : 'rgba(248,250,252,0.95)';
                    ctx.fillText(label, node.x, textY);
                }
            });

        // Add spread force to separate clusters nicely
        Graph.d3Force('charge').strength(-500); // Increased slightly to accommodate bigger nodes
        
        // Dynamic link distance: longer for main hubs, shorter for leaves
        Graph.d3Force('link').distance(link => {
            // Robust lookup against gNodesById, in case `link.source` has not yet been converted by d3
            const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
            const sourceNode = gNodesById[sourceId];
            const sourceGroup = sourceNode ? sourceNode.group : null;
            
            if (sourceId === 'synesis') return 180; // Core hub gets lots of space to breathe
            if (sourceGroup === 'skill' || sourceGroup === 'category') return 90; // Secondary hubs get medium space
            return 50; // Leaf nodes (tasks/files) stay compact but account for bigger nodes
        });

        // Dismiss node info on background click
        Graph.onBackgroundClick(() => {
            document.getElementById('node-info').style.display = 'none';
        });

        // ── Theme Toggle (wired after Graph exists) ────────────────────
        document.getElementById('theme-toggle').addEventListener('click', () => {
            isLight = !isLight;
            document.documentElement.classList.toggle('light', isLight);
            document.getElementById('theme-label').textContent = isLight ? '☀️ Light' : '🌙 Dark';
            Graph.backgroundColor(isLight ? '#e2e8f0' : '#0f172a');
        });

        // ── Search (wired after Graph exists) ─────────────────────────
        document.getElementById('search-box').addEventListener('input', e => {
            searchTerm = e.target.value.trim().toLowerCase();
        });

        // Handle Window Resize
        window.addEventListener('resize', () => {
            Graph.width(window.innerWidth);
            Graph.height(window.innerHeight);
        });
        } // end initGraph
    </script>
</body>
</html>
